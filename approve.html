<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>일일업무보고 승인</title>
<style>
  body{font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic',sans-serif;max-width:440px;margin:28px auto;padding:0 16px;color:#222}
  h2{margin-bottom:4px}
  .desc{color:#666;font-size:14px;margin:6px 0 16px}
  label{font-size:14px;font-weight:bold;display:block;margin-top:6px}
  select,input{width:100%;padding:10px;font-size:16px;margin:5px 0 12px;box-sizing:border-box;border:1px solid #ccc;border-radius:7px}
  .btn{width:100%;padding:13px;font-size:17px;border:0;border-radius:9px;font-weight:bold;cursor:pointer}
  .primary{background:#FEE500}
  .sec{background:#f1f3f5;margin-top:12px}
  #done{display:none;text-align:center;padding:24px 0}
  #done h3{color:#0a8a00}
  #rec{margin-top:14px;font-size:14px}
  .rec-item{padding:9px 10px;border-bottom:1px solid #eee;background:#fafafa;border-radius:6px;margin-top:6px}
  .rec-item b{color:#0a58ca}
</style>
</head>
<body>
<h2>📋 일일업무보고 승인</h2>
<div class="desc" id="meta"></div>

<div id="form">
  <p class="desc">승인자를 선택하고 확인 칸에 <b>"승인"</b>을 입력한 뒤 [승인하기]를 누르세요.</p>
  <label>승인자</label>
  <select id="who"><option value="">— 선택 —</option></select>
  <label>확인 입력 (정확히 "승인")</label>
  <input id="txt" placeholder="승인" autocomplete="off">
  <button class="btn primary" onclick="submitApprove()">승인하기</button>
</div>

<div id="done">
  <h3>✅ 승인 완료</h3>
  <p class="desc">일일업무보고 전송이 진행됩니다.</p>
</div>

<button class="btn sec" onclick="showRecords()">📜 승인 기록 보기</button>
<div id="rec"></div>

<script>
  var U = new URLSearchParams(location.search).get('u');
  var D = new URLSearchParams(location.search).get('date') || '';
  var WH = 'https://webhook.site/' + U;
  if (D) document.getElementById('meta').textContent = '보고 일자: ' + D;
  if (!U) document.getElementById('meta').textContent = '⚠ 잘못된 승인 링크(토큰 없음)';

  // 승인자 목록을 approvers.json(외부화)에서 로드. 실패 시 기본값.
  (function loadApprovers(){
    var sel = document.getElementById('who');
    function fill(list){ list.forEach(function(n){ var o=document.createElement('option'); o.textContent=n; sel.appendChild(o); }); }
    fetch('./approvers.json?t=' + Date.now(), {cache:'no-store'})
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(list){ fill(list); })
      .catch(function(){ fill(['김성택 팀장','임혜리 과장','윤영준 과장']); });
  })();

  function pad(n){ return (n < 10 ? '0' : '') + n; }
  function fmt(iso){
    // webhook created_at 은 UTC. 브라우저 로컬(KST)로 표시.
    var d = new Date((iso || '').replace(' ', 'T') + 'Z');
    if (isNaN(d)) return iso;
    return d.getFullYear() + '년 ' + pad(d.getMonth()+1) + '월 ' + pad(d.getDate()) + '일 ' +
           pad(d.getHours()) + '시 ' + pad(d.getMinutes()) + '분 ' + pad(d.getSeconds()) + '초';
  }

  function submitApprove(){
    var w = document.getElementById('who').value;
    var t = document.getElementById('txt').value.trim();
    if (!w){ alert('승인자를 선택하세요'); return; }
    if (t !== '승인'){ alert('확인 칸에 정확히 "승인" 이라고 입력하세요'); return; }
    var url = WH + '?submit=1&approver=' + encodeURIComponent(w) + '&text=' + encodeURIComponent(t) + '&date=' + encodeURIComponent(D);
    // 승인하는 순간 브라우저에 기록 저장 → Pages 게시 지연과 무관하게 '승인 기록 보기'에 즉시 표시
    try{
      var now = new Date();
      var utc = now.getUTCFullYear()+'-'+pad(now.getUTCMonth()+1)+'-'+pad(now.getUTCDate())+' '+
                pad(now.getUTCHours())+':'+pad(now.getUTCMinutes())+':'+pad(now.getUTCSeconds());
      var loc = JSON.parse(localStorage.getItem('approvals_local')||'[]');
      loc.push({date:D, approver:w, time_utc:utc, _local:true});
      localStorage.setItem('approvals_local', JSON.stringify(loc));
    }catch(e){}
    function ok(){ document.getElementById('form').style.display='none'; document.getElementById('done').style.display='block'; }
    fetch(url, {mode:'no-cors'}).then(ok).catch(ok);
  }

  function showRecords(){
    // 즉시기록(localStorage) + 서버기록(GitHub Pages approvals.json)을 합쳐서 표시.
    // → Pages 게시 지연(~1분) 중에도 방금 승인한 기록이 바로 보인다.
    var rec = document.getElementById('rec');
    rec.innerHTML = '불러오는 중...';
    var local = [];
    try{ local = JSON.parse(localStorage.getItem('approvals_local')||'[]'); }catch(e){}
    function render(all){
      var rows = (all || []).filter(function(x){ return x && x.approver; });
      var seen = {}, out = [];
      rows.forEach(function(x){
        var k = (x.date||'') + '|' + x.approver + '|' + String(x.time_utc||'').slice(0,15);
        if (!seen[k]){ seen[k] = 1; out.push(x); }
      });
      out.reverse();
      if (!out.length){ rec.innerHTML = '<p class="desc">아직 승인 기록이 없습니다.</p>'; return; }
      rec.innerHTML = '<h4>승인 기록 (' + out.length + '건)</h4>' + out.map(function(x){
        return '<div class="rec-item">' + fmt(x.time_utc) +
               '<br>일자 ' + (x.date||'') + ' &nbsp; <b>' + x.approver + '</b> 님 승인' +
               (x._local ? ' <span style="opacity:.55">· 방금</span>' : '') + '</div>';
      }).join('');
    }
    fetch('./approvals.json?t=' + Date.now(), {cache:'no-store'})
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(server){ render(local.concat(server || [])); })
      .catch(function(){ render(local); });   // 서버 조회 실패해도 즉시기록은 표시
  }
</script>
</body>
</html>
