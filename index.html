<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>삼천리모터스 일일영업보고</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#EEF0F4;color:#1A202C;font-size:13px}

/* ── Header ── */
.hdr{background:linear-gradient(135deg,#1B3A5C 0%,#2D6098 100%);color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.hdr-logo{font-size:18px;font-weight:800;letter-spacing:-.5px}
.hdr-sub{font-size:10px;opacity:.7;margin-top:2px}
.hdr-right{text-align:right;font-size:11px;opacity:.8;line-height:1.7}

/* ── Month Nav ── */
.mnav{background:#fff;border-bottom:1px solid #D8DDE5;padding:8px 20px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.mnav-arrow{width:26px;height:26px;border-radius:50%;border:1px solid #CBD5E0;background:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.mnav-arrow:hover{background:#1B3A5C;color:#fff;border-color:#1B3A5C}
.mnav-label{font-weight:700;font-size:13px;min-width:70px;text-align:center;color:#2D3748}
.mbtn{padding:4px 11px;border-radius:14px;border:1px solid #CBD5E0;background:#fff;cursor:pointer;font-size:11px;color:#4A5568}
.mbtn:hover{border-color:#1B3A5C;color:#1B3A5C}
.mbtn.on{background:#1B3A5C;color:#fff;border-color:#1B3A5C}

/* ── Main ── */
.main{padding:14px 20px;max-width:1400px;margin:0 auto}

/* ── 요약 테이블 ── */
.summary-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden;margin-bottom:12px}
.summary-title{background:#1B3A5C;color:#fff;font-size:12px;font-weight:700;padding:7px 14px;display:flex;align-items:center;gap:8px}
.sum-table{width:100%;border-collapse:collapse;font-size:12px}
.sum-table th{background:#F0F4FA;color:#2D3748;font-weight:700;padding:6px 12px;text-align:center;border-bottom:1px solid #D8DDE5;border-right:1px solid #E2E8F0}
.sum-table td{padding:6px 12px;text-align:right;border-bottom:1px solid #F0F2F5;border-right:1px solid #E2E8F0}
.sum-table td.lbl{text-align:left;font-weight:700;background:#FAFBFD;color:#2D3748;padding-left:14px}
.sum-table td.unit{text-align:center;color:#718096;font-size:10px;background:#FAFBFD}
.sum-table .pct.hi{color:#27AE60;font-weight:700}
.sum-table .pct.mid{color:#2D6098}
.sum-table .pct.lo{color:#E53E3E}
.sum-table .sep{border-left:2px solid #CBD5E0}

/* ── Date bar ── */
.date-bar{display:flex;align-items:center;gap:10px;margin-bottom:10px;background:#fff;padding:8px 14px;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.date-bar label{font-size:12px;color:#4A5568;font-weight:600}
.date-bar select{padding:4px 10px;border:1px solid #CBD5E0;border-radius:5px;font-size:12px;background:#fff;cursor:pointer}
.prog-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.prog-label{font-size:11px;color:#4A5568}
.prog-bar{width:120px;height:8px;background:#E2E8F0;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;background:#27AE60;transition:width .4s}

/* ── Report Table ── */
.rep-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow-x:auto;margin-bottom:16px}
.rep-table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
.rep-table th,.rep-table td{padding:5px 8px;text-align:right;border:1px solid #D8DDE5}
.rep-table td.l{text-align:left}
.rep-table td.c{text-align:center}
.rep-table td.na{color:#A0AEC0;text-align:center;background:#FAFAFA}

/* Main header */
.rep-table tr.main-hdr td{background:#1B3A5C;color:#fff;text-align:left;font-weight:700;font-size:13px;padding:8px 12px;border-color:#1B3A5C}
/* Column header */
.rep-table tr.col-hdr td{background:#E8EDF3;color:#2D3748;font-weight:700;text-align:center;font-size:11px;padding:4px 6px}
/* Section label */
.rep-table tr.sec-sales td{background:#EBF4FF;color:#1B3A5C;font-weight:700;text-align:left;font-size:11px;padding:4px 10px;border-top:2px solid #4472C4}
.rep-table tr.sec-as td{background:#FFFBEB;color:#92400E;font-weight:700;text-align:left;font-size:11px;padding:4px 10px;border-top:2px solid #E8A838}
.rep-table tr.sec-bps td{background:#F0FFF4;color:#276749;font-weight:700;text-align:left;font-size:11px;padding:4px 10px;border-top:2px solid #27AE60}
/* Total row */
.rep-table tr.ttl td{background:#F7FAFC;font-weight:700;color:#1A202C}
/* Hover */
.rep-table tbody tr:not(.sec-sales):not(.sec-as):not(.sec-bps):not(.col-hdr):not(.main-hdr):hover td{background:#F0F4FA}
/* Progress color */
.rep-table .hi{color:#27AE60;font-weight:700}
.rep-table .mid{color:#2D6098}
.rep-table .lo{color:#E53E3E}
/* Reogo (재고) row */
.rep-table tr.reogo-row td{background:#F0FFF4;font-size:12px;text-align:center}

/* ── Trend Charts ── */
.trend-hdr{display:flex;align-items:center;gap:8px;margin:20px 0 10px;font-size:14px;font-weight:700;color:#2D3748}
.trend-hdr span{width:4px;height:18px;background:#1B3A5C;border-radius:2px;display:inline-block}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:800px){.chart-grid{grid-template-columns:1fr}}
.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
@media(max-width:900px){.chart-grid-3{grid-template-columns:1fr 1fr}}
.cc{background:#fff;border-radius:10px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.cc-title{font-size:12px;font-weight:700;color:#2D3748;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.cw{position:relative;height:220px}
.cw-lg{position:relative;height:260px}

/* Tab buttons */
.tab-row{display:flex;gap:3px}
.tbtn{padding:3px 9px;border-radius:4px;border:1px solid #CBD5E0;background:#fff;cursor:pointer;font-size:10px;color:#4A5568}
.tbtn.on{background:#1B3A5C;color:#fff;border-color:#1B3A5C}

/* ── Loading / Empty ── */
.loading{text-align:center;padding:60px;color:#718096;font-size:14px}
.empty{text-align:center;padding:60px;color:#A0AEC0;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#EEF0F4}
::-webkit-scrollbar-thumb{background:#CBD5E0;border-radius:3px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <div class="hdr-logo">삼천리모터스</div>
    <div class="hdr-sub">일일영업보고 대시보드 · 자동화 시스템</div>
  </div>
  <div class="hdr-right" id="hdrRight">로딩 중...</div>
</div>

<div class="mnav">
  <button class="mnav-arrow" id="btnPrev">◀</button>
  <span class="mnav-label" id="mnavLabel">-</span>
  <button class="mnav-arrow" id="btnNext">▶</button>
  <div style="width:1px;height:18px;background:#E2E8F0;margin:0 3px"></div>
  <div id="mnavBtns" style="display:flex;gap:4px;flex-wrap:wrap"></div>
</div>

<div class="main" id="main">
  <div class="loading">⏳ 데이터 불러오는 중...</div>
</div>

<script>
const BRANCHES = ['청주','천안','동탄','안양','안산','세종'];
const AS지점 = ['청주','팩토리','천안','동탄','안양','세종','군포','안산'];
const BPS지점 = ['천안','안양','합계'];
const BC = {청주:'#4472C4',천안:'#ED7D31',동탄:'#5BA85B',안양:'#9B59B6',안산:'#E74C3C',세종:'#16A085',합계:'#2D3748'};
const AS_BC = {청주:'#4472C4',팩토리:'#A0AEC0',천안:'#ED7D31',동탄:'#5BA85B',안양:'#9B59B6',세종:'#16A085',군포:'#E8A838',안산:'#E74C3C',합계:'#2D3748'};
const BPSC = {천안:'#E8A838',안양:'#4A90D9',합계:'#2D3748'};

let allDates = [], allData = {}, availMonths = [], curYM = '';
let curRecords = [], selDate = '', charts = {};
let salesMetric = 'contract';

async function fetchJSON(url) {
  const r = await fetch(url + '?_=' + Date.now());
  if (!r.ok) throw new Error(r.status);
  return r.json();
}
async function loadIndex() { try { return await fetchJSON('data/index.json'); } catch { return []; } }
async function loadRecord(d) {
  if (allData[d]) return allData[d];
  try { allData[d] = await fetchJSON(`data/${d}.json`); return allData[d]; } catch { return null; }
}
async function loadMonth(ym) {
  const dates = allDates.filter(d => d.startsWith(ym));
  const recs = await Promise.all(dates.map(d => loadRecord(d)));
  return recs.filter(Boolean);
}

// ─── Month Nav ────────────────────────────────────────────────
function buildMonthNav() {
  const el = document.getElementById('mnavBtns'); el.innerHTML = '';
  availMonths.forEach(ym => {
    const b = document.createElement('button');
    b.className = 'mbtn' + (ym === curYM ? ' on' : '');
    b.dataset.ym = ym;
    b.textContent = `${ym.slice(0,4)}.${ym.slice(4)}`;
    b.onclick = () => switchMonth(ym);
    el.appendChild(b);
  });
  const y = curYM.slice(0,4), m = parseInt(curYM.slice(4));
  document.getElementById('mnavLabel').textContent = `${y}년 ${m}월`;
  document.querySelectorAll('.mbtn').forEach(b => b.classList.toggle('on', b.dataset.ym === curYM));
}
async function switchMonth(ym) {
  curYM = ym; buildMonthNav();
  document.getElementById('main').innerHTML = '<div class="loading">⏳ 불러오는 중...</div>';
  curRecords = await loadMonth(ym);
  selDate = curRecords.length ? curRecords[curRecords.length-1].date : '';
  render();
}
document.getElementById('btnPrev').onclick = () => { const i = availMonths.indexOf(curYM); if(i>0) switchMonth(availMonths[i-1]); };
document.getElementById('btnNext').onclick = () => { const i = availMonths.indexOf(curYM); if(i<availMonths.length-1) switchMonth(availMonths[i+1]); };

// ─── Chart helpers ─────────────────────────────────────────────
function destroyCharts() { Object.values(charts).forEach(c=>{try{c.destroy()}catch{}}); charts={}; }
function mkChart(id, cfg) {
  const el = document.getElementById(id); if(!el) return;
  if(charts[id]) charts[id].destroy();
  charts[id] = new Chart(el, cfg);
}
const BASE_OPT = {
  responsive:true, maintainAspectRatio:false, animation:{duration:300},
  plugins:{legend:{position:'bottom',labels:{boxWidth:9,padding:7,font:{size:10}}}},
  scales:{
    x:{grid:{display:false},ticks:{font:{size:10},maxTicksLimit:15}},
    y:{grid:{color:'#F0F2F5'},ticks:{font:{size:10}}},
  },
};

// ─── Format helpers ────────────────────────────────────────────
const _n = v => (v != null && v !== '') ? v : '-';
const _f = v => (typeof v === 'number') ? v.toFixed(1) : '-';
const _p = v => (typeof v === 'number' && v !== 0) ? v.toFixed(1)+'%' : (v === 0 ? '0.0%' : '-');
const _cls = v => typeof v==='number' ? (v>=100?'hi':v>=80?'mid':'lo') : '';

// ─── Report Table ──────────────────────────────────────────────
function buildRepTable(rec) {
  const rep = rec.rep || {};
  const plans = rec.plans || {};
  const sales = rec.sales || {};
  const bps = rec.bps || {};

  const 진척 = rec.전체영업일 ? Math.round(rec.영업일수/rec.전체영업일*100) : 0;

  // Fallback helpers
  const getContract = (b, src, planKey) => {
    if (src?.[b]) return src[b];
    const s = sales[b] || {};
    const 계획 = plans[planKey] || 0;
    const 진척 = 계획 ? +(s.계약누계/계획*100).toFixed(1) : 0;
    return {당일:s.순계약||0, 월누계:s.계약누계||0, 계획, 진척률:진척, 누적:0, 누적진척률:0};
  };
  const getDelivery = (b, src, planKey) => {
    if (src?.[b]) return src[b];
    const s = sales[b] || {};
    const 계획 = plans[planKey] || 0;
    const 진척 = 계획 ? +(s.출고누계/계획*100).toFixed(1) : 0;
    return {배정대기:s.배정||0, 당일배정:0, 당일출고:s.출고||0, 월배정누계:0, 월출고누계:s.출고누계||0, 출고계획:계획, 진척률:진척, 누적배정:0, 누적출고:0, 누적진척률:0};
  };
  const getBpsContract = (b, src) => {
    if (src?.[b]) return src[b];
    const k = bps[b] || {};
    const 계획 = plans[`BPS계약계획_${b}`] || 0;
    const 진척 = 계획 ? +(k.월누계계약/계획*100).toFixed(1) : 0;
    return {당일:k.당일계약||0, 월누계:k.월누계계약||0, 계획, 진척률:진척, 누적:0, 누적진척률:0};
  };
  const getBpsDelivery = (b, src) => {
    if (src?.[b]) return src[b];
    const k = bps[b] || {};
    const 계획 = plans[`BPS출고계획_${b}`] || 0;
    const 진척 = 계획 ? +(k.월누계출고/계획*100).toFixed(1) : 0;
    return {배정대기:k.배정||0, 당일배정:0, 당일출고:k.당일출고||0, 월배정누계:0, 월출고누계:k.월누계출고||0, 출고계획:계획, 진척률:진척, 누적배정:0, 누적출고:0, 누적진척률:0};
  };

  // Row templates
  const colHdr1 = () => `<tr class="col-hdr">
    <td style="text-align:left;min-width:70px">지점</td>
    <td style="min-width:38px">당일</td>
    <td style="min-width:50px">월누계</td>
    <td style="min-width:50px">계획</td>
    <td style="min-width:54px">진척률</td>
    <td style="min-width:52px">누적실적</td>
    <td style="min-width:60px">누적진척률</td>
  </tr>`;

  const colHdr2 = () => `<tr class="col-hdr">
    <td style="text-align:left;min-width:70px">지점</td>
    <td style="min-width:40px">배정</td>
    <td style="min-width:38px">출고</td>
    <td style="min-width:50px">월배정</td>
    <td style="min-width:50px">월출고</td>
    <td style="min-width:50px">출고계획</td>
    <td style="min-width:54px">진척률</td>
    <td style="min-width:52px">누적배정</td>
    <td style="min-width:52px">누적출고</td>
    <td style="min-width:60px">누적진척률</td>
  </tr>`;

  const colHdrAS = () => `<tr class="col-hdr">
    <td style="text-align:left;min-width:70px">지점</td>
    <td style="min-width:36px">인원</td>
    <td style="min-width:52px">당일(백만)</td>
    <td style="min-width:60px">월누계</td>
    <td style="min-width:60px">계획</td>
    <td style="min-width:54px">진척률</td>
    <td style="min-width:60px">누적실적</td>
    <td style="min-width:60px">누적진척률</td>
  </tr>`;

  const row1 = (lbl, d, isTtl) => {
    if (!d) return '';
    const cls = isTtl ? ' class="ttl"' : '';
    const pc = _cls(d.진척률), np = _cls(d.누적진척률);
    return `<tr${cls}>
      <td class="l">${lbl}</td>
      <td>${_n(d.당일)}</td>
      <td>${_n(d.월누계)}</td>
      <td>${_n(d.계획)}</td>
      <td class="${pc}">${_p(d.진척률)}</td>
      <td>${_n(d.누적)||'-'}</td>
      <td class="${np}">${_p(d.누적진척률)||'-'}</td>
    </tr>`;
  };

  const row2 = (lbl, d, isTtl) => {
    if (!d) return '';
    const cls = isTtl ? ' class="ttl"' : '';
    const pc = _cls(d.진척률), np = _cls(d.누적진척률);
    return `<tr${cls}>
      <td class="l">${lbl}</td>
      <td>${_n(d.배정대기)}</td>
      <td>${_n(d.당일출고)}</td>
      <td>${_n(d.월배정누계)||'-'}</td>
      <td>${_n(d.월출고누계)}</td>
      <td>${_n(d.출고계획)}</td>
      <td class="${pc}">${_p(d.진척률)}</td>
      <td>${_n(d.누적배정)||'-'}</td>
      <td>${_n(d.누적출고)||'-'}</td>
      <td class="${np}">${_p(d.누적진척률)||'-'}</td>
    </tr>`;
  };

  const rowAS = (lbl, d, isTtl) => {
    if (!d) return '';
    const cls = isTtl ? ' class="ttl"' : '';
    const pc = _cls(d.진척률), np = _cls(d.누적진척률);
    return `<tr${cls}>
      <td class="l">${lbl}</td>
      <td class="c">${_n(d.인원)}</td>
      <td>${_f(d.당일)}</td>
      <td>${_f(d.월누계)}</td>
      <td>${_f(d.계획)}</td>
      <td class="${pc}">${_p(d.진척률)}</td>
      <td>${_f(d.누적)}</td>
      <td class="${np}">${_p(d.누적진척률)}</td>
    </tr>`;
  };

  const sc = rep.sales_계약 || {};
  const sd = rep.sales_출고 || {};
  const sa = rep.as;
  const bc_data = rep.bps_계약 || {};
  const bd_data = rep.bps_출고 || {};
  const brd = rep.bps_재고 || {재고합계:bps.재고합계||0,장기재고:bps.장기재고||0,당월매입:bps.당월매입||0};

  let h = `<thead>
    <tr class="main-hdr">
      <td colspan="20">□ 부문별 상세내역&emsp;기준일: <b>${rec.report_date}</b>&emsp;기간: ${rec.period_start}~${rec.period_end} (${rec.period_days}일간)&emsp;영업일: <b>${rec.영업일수}/${rec.전체영업일}일</b> (${진척}%)</td>
    </tr>
  </thead><tbody>`;

  // ── SALES 계약 ──
  h += `<tr class="sec-sales"><td colspan="7">🚗 SALES 신차 &nbsp;·&nbsp; 계약 (단위: 대)</td></tr>`;
  h += colHdr1();
  BRANCHES.forEach(b => { h += row1(b, getContract(b, sc, `계약계획_${b}`), false); });
  h += row1('합계', getContract('합계', sc, '계약계획_합계'), true);

  // ── SALES 출고 ──
  h += `<tr class="sec-sales"><td colspan="10">🚗 SALES 신차 &nbsp;·&nbsp; 배정+출고 (단위: 대)&emsp;<small style="font-weight:normal;color:#4A5568">배정=현재배정대기, 출고=당일출고</small></td></tr>`;
  h += colHdr2();
  BRANCHES.forEach(b => { h += row2(b, getDelivery(b, sd, `출고계획_${b}`), false); });
  h += row2('합계', getDelivery('합계', sd, '출고계획_합계'), true);

  // ── AS ──
  h += `<tr class="sec-as"><td colspan="8">🔧 A/S 매출 (단위: 백만원)&emsp;<small style="font-weight:normal;color:#92400E">Retail+상품매출+DHC 합산</small></td></tr>`;
  h += colHdrAS();
  if (sa) {
    AS지점.forEach(b => { h += rowAS(b, sa[b], false); });
    h += rowAS('합계', sa['합계'], true);
  } else {
    h += `<tr><td colspan="8" style="text-align:center;color:#A0AEC0;padding:12px">AS 데이터 없음 — samchully_daily.py 재실행 시 자동 추가됩니다</td></tr>`;
  }

  // ── BPS 계약 ──
  h += `<tr class="sec-bps"><td colspan="7">🏷 BPS 인증중고차 &nbsp;·&nbsp; 계약 (단위: 대)</td></tr>`;
  h += colHdr1();
  BPS지점.forEach(b => { h += row1(b, getBpsContract(b, bc_data), b==='합계'); });

  // ── BPS 출고 ──
  h += `<tr class="sec-bps"><td colspan="10">🏷 BPS 인증중고차 &nbsp;·&nbsp; 배정+출고 (단위: 대)</td></tr>`;
  h += colHdr2();
  BPS지점.forEach(b => { h += row2(b, getBpsDelivery(b, bd_data), b==='합계'); });

  // ── BPS 재고 ──
  const 천안재고 = bps.천안?.재고 ?? '-';
  const 안양재고 = bps.안양?.재고 ?? '-';
  h += `<tr class="sec-bps"><td colspan="10">🏷 BPS 재고 현황</td></tr>`;
  h += `<tr class="reogo-row">
    <td class="l" colspan="2"><b>재고 합계: ${brd.재고합계}대</b>&emsp;(천안 ${천안재고} / 안양 ${안양재고})</td>
    <td colspan="4">장기재고: <b>${brd.장기재고}대</b></td>
    <td colspan="4">당월매입: <b>${brd.당월매입}대</b></td>
  </tr>`;

  h += `</tbody>`;
  return h;
}

// ─── Trend Charts ──────────────────────────────────────────────
function renderSalesContractChart(recs) {
  const labels = recs.map(r => r.report_date.slice(5));
  const key = salesMetric === 'contract' ? '순계약' : '출고';
  const datasets = BRANCHES.map(b => ({
    label: b,
    data: recs.map(r => r.sales?.[b]?.[key] ?? null),
    borderColor: BC[b], backgroundColor: BC[b]+'18',
    fill: false, tension: 0.3, pointRadius: 3, borderWidth: 2, spanGaps: true,
  }));
  datasets.push({
    label: '합계',
    data: recs.map(r => r.sales?.합계?.[key] ?? null),
    borderColor: '#1B3A5C', backgroundColor: 'transparent',
    fill: false, tension: 0.3, pointRadius: 4, borderWidth: 2.5, borderDash: [5,3], spanGaps: true,
  });
  mkChart('salesLine', {type:'line', data:{labels, datasets}, options:{...BASE_OPT, spanGaps:true}});
}

function renderSalesProgress(latest) {
  const labels = BRANCHES;
  const 누계 = labels.map(b => latest.sales?.[b]?.출고누계 ?? 0);
  const 계획 = labels.map(b => latest.plans?.[`출고계획_${b}`] ?? 0);
  const colors = labels.map(b => BC[b]);
  mkChart('salesProg', {
    type:'bar',
    data:{labels, datasets:[
      {label:'출고 누계', data:누계, backgroundColor:colors.map(c=>c+'CC'), borderWidth:0, borderRadius:4},
      {label:'월 계획', data:계획, backgroundColor:'transparent', borderColor:colors, borderWidth:1.5, borderRadius:4},
    ]},
    options:{...BASE_OPT, indexAxis:'y',
      scales:{x:{...BASE_OPT.scales.x,grid:{display:true,color:'#F0F2F5'}}, y:{grid:{display:false},ticks:{font:{size:11}}}},
      plugins:{...BASE_OPT.plugins,
        tooltip:{callbacks:{afterBody:items=>{const i=items[0].dataIndex;const n=누계[i],c=계획[i];return c?[`달성률: ${Math.round(n/c*100)}%`]:[];}}},
      },
    },
  });
}

// ─── Main Render ───────────────────────────────────────────────
function render() {
  if (!curRecords.length) {
    document.getElementById('main').innerHTML = `<div class="empty">📭 ${curYM.slice(0,4)}년 ${parseInt(curYM.slice(4))}월 데이터 없음</div>`;
    return;
  }
  destroyCharts();

  const latest = curRecords[curRecords.length - 1];
  const selRec = allData[selDate] || latest;

  document.getElementById('hdrRight').innerHTML = `최근 보고일: <b>${latest.report_date}</b>`;

  // Build layout
  document.getElementById('main').innerHTML = `
    <div class="date-bar">
      <label>보고일 선택:</label>
      <select id="dateSelect">${curRecords.map(r=>`<option value="${r.date}"${r.date===selDate?' selected':''}>${r.report_date}</option>`).join('')}</select>
      <div class="prog-wrap">
        <span class="prog-label">영업일: ${latest.영업일수}/${latest.전체영업일}일 (${latest.전체영업일?Math.round(latest.영업일수/latest.전체영업일*100):0}%)</span>
        <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      </div>
    </div>

    <div class="summary-wrap" id="summaryWrap"></div>

    <div class="rep-wrap">
      <table class="rep-table" id="repTable"></table>
    </div>

    <div class="trend-hdr"><span></span> 기간별 트렌드 · ${curYM.slice(0,4)}년 ${parseInt(curYM.slice(4))}월</div>

    <div class="chart-grid">
      <div class="cc">
        <div class="cc-title">
          SALES 당일 실적 추이
          <div class="tab-row">
            <button class="tbtn on" id="tCon" onclick="setSalesMetric('contract')">순계약</button>
            <button class="tbtn" id="tDel" onclick="setSalesMetric('delivery')">출고</button>
          </div>
        </div>
        <div class="cw"><canvas id="salesLine"></canvas></div>
      </div>
      <div class="cc">
        <div class="cc-title">SALES 출고 누계 vs 계획 (최신 기준)</div>
        <div class="cw"><canvas id="salesProg"></canvas></div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="cc">
        <div class="cc-title">SALES 월 계약 누계</div>
        <div class="cw"><canvas id="salesCum"></canvas></div>
      </div>
      <div class="cc">
        <div class="cc-title">A/S 월누계 매출 추이 (백만원)</div>
        <div class="cw"><canvas id="asLine"></canvas></div>
      </div>
    </div>

    <div class="chart-grid">
      <div class="cc">
        <div class="cc-title">BPS 배정잔액 추이</div>
        <div class="cw"><canvas id="bpsBalance"></canvas></div>
      </div>
      <div class="cc">
        <div class="cc-title">BPS 월 누계 계약·출고</div>
        <div class="cw"><canvas id="bpsCum"></canvas></div>
      </div>
    </div>
  `;

  // Progress fill
  const pct = latest.전체영업일 ? latest.영업일수/latest.전체영업일*100 : 0;
  document.getElementById('progFill').style.width = Math.min(pct,100)+'%';

  // 요약 테이블 (AE13:AL18 양식)
  document.getElementById('summaryWrap').innerHTML = buildSummary(selRec);

  // Report table
  document.getElementById('repTable').innerHTML = buildRepTable(selRec);

  // Date select handler
  document.getElementById('dateSelect').onchange = function() {
    selDate = this.value;
    const r = allData[selDate] || latest;
    document.getElementById('summaryWrap').innerHTML = buildSummary(r);
    document.getElementById('repTable').innerHTML = buildRepTable(r);

  // Charts
  renderSalesContractChart(curRecords);
  renderSalesProgress(latest);

  renderAsChart(curRecords);
  renderBpsBalanceChart(curRecords);
  renderBpsCumChart(curRecords);
}

// ─── 요약 테이블 (AE13:AL18 □ 요약 양식) ──────────────────────
function buildSummary(rec) {
  const 요약 = rec?.rep?.요약;
  const plans = rec?.plans || {};
  const sales = rec?.sales || {};
  const bps   = rec?.bps   || {};

  // 요약 없으면 sales/bps/plans에서 fallback 계산
  const getSales = () => 요약?.SALES || (() => {
    const s = sales.합계 || {};
    const 계획 = plans.출고계획_합계 || 0;
    const 진척 = 계획 ? +(s.출고누계/계획*100).toFixed(1) : 0;
    return {단위:'대', 당월계획:계획, 당월실적:s.출고누계||0, 당월진척:진척, 누적계획:0, 누적실적:0, 누적진척:0};
  })();
  const getAS = () => 요약?.AS || {단위:'백만원', 당월계획:plans.AS계획_합계||0, 당월실적:0, 당월진척:0, 누적계획:0, 누적실적:0, 누적진척:0};
  const getBPS = () => 요약?.BPS || (() => {
    const b = bps.합계 || {};
    const 계획 = plans.BPS출고계획_합계 || 0;
    const 진척 = 계획 ? +(( b.월누계출고||0)/계획*100).toFixed(1) : 0;
    return {단위:'대', 당월계획:계획, 당월실적:b.월누계출고||0, 당월진척:진척, 누적계획:0, 누적실적:0, 누적진척:0};
  })();

  const sv = getSales(), av = getAS(), bv = getBPS();
  const pcls = v => typeof v==='number' ? (v>=100?'pct hi':v>=80?'pct mid':'pct lo') : '';
  const pstr = v => typeof v==='number' && v!==0 ? v.toFixed(1)+'%' : '-';
  const nstr = (v, isFloat) => (v != null && v !== 0) ? (isFloat ? parseFloat(v).toFixed(1) : v) : '-';

  const row = (lbl, d, isFloat) => `
    <tr>
      <td class="lbl">${lbl}</td>
      <td class="unit">(${d.단위})</td>
      <td>${nstr(d.당월계획, isFloat)}</td>
      <td>${nstr(d.당월실적, isFloat)}</td>
      <td class="${pcls(d.당월진척)}">${pstr(d.당월진척)}</td>
      <td class="sep">${nstr(d.누적계획, isFloat)}</td>
      <td>${nstr(d.누적실적, isFloat)}</td>
      <td class="${pcls(d.누적진척)}">${pstr(d.누적진척)}</td>
    </tr>`;

  return `
    <div class="summary-title">
      □ 요약&emsp;기준일: ${rec.report_date}&emsp;기간: ${rec.period_start}~${rec.period_end}&emsp;영업일: ${rec.영업일수}/${rec.전체영업일}일
    </div>
    <table class="sum-table">
      <thead>
        <tr>
          <th rowspan="2" style="text-align:left;min-width:60px">구분</th>
          <th rowspan="2" style="min-width:50px">단위</th>
          <th colspan="3">당&nbsp;&nbsp;월</th>
          <th colspan="3" class="sep">누&nbsp;&nbsp;적</th>
        </tr>
        <tr>
          <th>계획</th><th>실적</th><th>진척률</th>
          <th class="sep">계획</th><th>실적</th><th>진척률</th>
        </tr>
      </thead>
      <tbody>
        ${row('SALES', sv, false)}
        ${row('A/S', av, true)}
        ${row('BPS', bv, false)}
      </tbody>
    </table>`;
}

function setSalesMetric(m) {
  salesMetric = m;
  document.getElementById('tCon').classList.toggle('on', m==='contract');
  document.getElementById('tDel').classList.toggle('on', m==='delivery');
  renderSalesContractChart(curRecords);
}

// ─── Init ──────────────────────────────────────────────────────
async function init() {
  allDates = await loadIndex();
  if (!allDates.length) {
    document.getElementById('main').innerHTML = `<div class="empty">📭 데이터 없음<br><br><small>samchully_daily.py 실행 시 자동으로 데이터가 추가됩니다.</small></div>`;
    document.getElementById('hdrRight').textContent = '데이터 없음';
    return;
  }
  const monthSet = new Set(allDates.map(d => d.slice(0,6)));
  availMonths = [...monthSet].sort();
  curYM = availMonths[availMonths.length - 1];
  buildMonthNav();
  curRecords = await loadMonth(curYM);
  selDate = curRecords.length ? curRecords[curRecords.length-1].date : '';
  render();
}
init();
